{{define "error.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Patreon Manager</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #242736;
            --border: #2e3141;
            --text: #e1e4ed;
            --text-muted: #8b8fa3;
            --accent: #ff424d;
            --accent-hover: #e63a44;
            --success: #2ecc71;
            --warning: #f39c12;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            margin-bottom: 32px;
        }
        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 18px; font-weight: 600; }
        header h1 a { color: var(--text); text-decoration: none; }
        header h1 a:hover { color: var(--accent); }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-left: 20px;
        }
        nav a:hover { color: var(--text); }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }
        .btn-secondary { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        footer {
            margin-top: 64px;
            padding: 24px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/preview">Patreon Manager</a></h1>
            <nav>
                <a href="/health">Health</a>
                <a href="/metrics">Metrics</a>
            </nav>
        </div>
    </header>
    <main class="container">
<div style="text-align:center;padding:64px 0;">
    <h2 style="font-size:20px;margin-bottom:12px;">{{.Error}}</h2>
    <a href="/preview" class="btn btn-secondary" style="margin-top:16px;">Back to Preview</a>
</div>
    </main>
    <footer>
        <div class="container">My Patreon Manager &mdash; Content Preview</div>
    </footer>
</body>
</html>
{{end}}
