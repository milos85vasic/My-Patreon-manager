{{define "preview_edit.html"}}
{{template "layout.html" .}}
{{end}}

{{define "head"}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
{{end}}

{{define "content"}}
{{with .Article}}
<div style="margin-bottom:24px;">
    <a href="/preview/article/{{.ID}}" style="color:var(--text-muted);text-decoration:none;font-size:14px;">&larr; Back to article</a>
    <h2 style="font-size:22px;margin-top:8px;">Edit Article</h2>
</div>
<form method="POST" action="/preview/edit/{{.ID}}" style="display:flex;flex-direction:column;gap:20px;">
    <div>
        <label style="display:block;font-size:14px;font-weight:500;margin-bottom:6px;">Title</label>
        <input type="text" name="title" value="{{.Title}}" style="width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;">
    </div>
    <div>
        <label style="display:block;font-size:14px;font-weight:500;margin-bottom:6px;">Content</label>
        <textarea id="body-editor" name="body" style="display:none;">{{.Body}}</textarea>
    </div>
    <div>
        <label style="display:block;font-size:14px;font-weight:500;margin-bottom:6px;">Status</label>
        <select name="status" style="padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;">
            <option value="draft" {{if eq .Status "draft"}}selected{{end}}>Draft</option>
            <option value="published" {{if eq .Status "published"}}selected{{end}}>Published</option>
        </select>
    </div>
    <div style="display:flex;gap:8px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/preview/article/{{.ID}}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
<script>
var easyMDE = new EasyMDE({
    element: document.getElementById("body-editor"),
    spellChecker: false,
    autosave: {enabled: false},
    toolbar: ["bold","italic","heading","|","quote","code","link","image","|","unordered-list","ordered-list","|","preview","side-by-side","fullscreen","|","guide"],
    status: false,
    minHeight: "400px"
});
</script>
{{end}}
{{end}}
