services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      llmsverifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  llmsverifier:
    build:
      context: ./LLMsVerifier
      dockerfile: Dockerfile
    ports:
      - "${LLMSVERIFIER_PORT:-9099}:8080"
    environment:
      - API_KEY=${LLMSVERIFIER_API_KEY:-}
    volumes:
      - llmsverifier-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: patreon_manager
      POSTGRES_USER: patreon
      POSTGRES_PASSWORD: patreon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - production

volumes:
  pgdata:
  llmsverifier-data:
